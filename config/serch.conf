# ============================================================
# 搜索引擎配置文件
# 以 # 开头的行是注释行，配置解析器会自动跳过
# 格式：key:value
# ============================================================

# -------------------- 路径配置 --------------------

# XML语料库目录：存放所有 RSS/XML 格式的原始语料文件
xmlPath:/home/marisa/code1/search-engine/data/yuliao/xml

# 处理后网页库文件路径：readInfoFromFile() 将解析后的文档写入此文件
webPagePath:/home/marisa/code1/search-engine/data/newripepage.dat

# 中文语料目录（用于词典构建，如 DictProducer 构建中文词典时的源文件目录）
chineseDir:/home/marisa/code1/search-engine/data/yuliao/chinese

# 英文语料目录（用于构建英文词典）
englishDir:/home/marisa/code1/search-engine/data/yuliao/english

# 中文停用词文件路径（用于过滤倒排索引中的无意义词）
stopWordsCnPath:/home/marisa/code1/search-engine/data/yuliao/stop_words_zh.txt

# 英文停用词文件路径（用于过滤英文词典中的无意义词）
stopWordsEnPath:/home/marisa/code1/search-engine/data/yuliao/stop_words_eng.txt

# 日志文件路径
logPath:/home/marisa/code1/search-engine/log/log.txt

# jieba 分词库词典路径
jiebaDictPath:/home/marisa/code1/search-engine/dict/jieba.dict.utf8

# jieba HMM 模型路径（隐式马尔科夫模型，用于未登录词识别）
hmmPath:/home/marisa/code1/search-engine/dict/hmm_model.utf8

# jieba 用户自定义词典路径
userDictPath:/home/marisa/code1/search-engine/dict/user.dict.utf8

# jieba IDF 路径（关键词提取用）
idfPath:/home/marisa/code1/search-engine/dict/idf.utf8

# jieba 停用词路径（关键词提取用）
jiebaStopWordPath:/home/marisa/code1/search-engine/dict/stop_words.utf8

# -------------------- 网络配置 --------------------

# 服务器监听 IP 地址
serverIp:192.168.159.129

# 服务器监听端口号
serverPort:8080

# 子 EventLoop 数量（每个子 EventLoop 独立线程运行，处理 I/O）
subEventLoopCount:4

# -------------------- 线程池配置 --------------------

# 线程池工作线程数
threadPoolThreadCount:4

# 线程池任务队列最大长度
threadPoolQueueSize:4

# -------------------- 算法参数 --------------------

# 关键词提取 / 相似哈希的 TopN 值
topNVal:10

# 海明距离阈值（用于 simhash 去重，值越小越严格）
simhashDistance:3

# DictProducer 英文缓冲区大小（字节），对应 buildEnDict() 中 englishBuf 的分配大小
englishBufSize:6488671

# DictProducer 中文缓冲区大小（字节），对应 buildCnDict() 中 chineseBuf 的分配大小
chineseBufSize:100000

# 停用词文件读取缓冲区大小（字节），用于 DictProducer 和 PageLibPreprocessor 读取停用词文件
stopFileBufSize:8192

# -------------------- 日志配置 --------------------

# 日志缓冲区大小（字节）
logBufferSize:4096

# 日志级别：0=DEBUG 1=INFO 2=WARN 3=ERROR
logLevel:1

end
