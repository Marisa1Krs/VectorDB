# ============================================================
# 搜索引擎配置文件（语义搜索版本）
# 以 # 开头的行是注释行，配置解析器会自动跳过
# 格式：key:value
# ============================================================
#
# 【变更说明】
# 已删除以下 jieba/倒排索引相关的配置项：
#   - jiebaDictPath / hmmPath / userDictPath / idfPath / jiebaStopWordPath
#   - chineseDir / englishDir / stopWordsCnPath / stopWordsEnPath
#   - webPagePath（不再写入 newripepage.dat）
#   - englishBufSize / chineseBufSize / stopFileBufSize
#   - simhashDistance / topNVal
#
# 已新增以下语义搜索相关的配置项：
#   - modelPath：ONNX 模型文件路径
#   - vocabPath：tokenizer.json 分词器路径
#   - sqliteDbPath：SQLite 数据库文件路径

# -------------------- 路径配置 --------------------
# 所有路径均使用相对路径（相对于工作目录），便于跨服务器部署

# XML 语料库目录：存放所有 RSS/XML 格式的原始语料文件
xmlPath:data/yuliao/xml

# ONNX 模型文件路径（BERT 语义模型）
modelPath:model/model.onnx

# 分词器配置文件路径（WordPiece tokenizer.json）
vocabPath:model/tokenizer.json

# SQLite 数据库文件路径（存储文档和向量 embedding）
# 替代了原来的 newripepage.dat 原始文件存储
sqliteDbPath:data/semantic_index.db

# IVF 索引文件路径（K-Means 聚类加速 ANN 检索）
# 包含：质心矩阵（K×dim float）+ 聚类分配（N 个 int）
# 构建索引时自动训练，查询时自动加载
ivfIndexPath:data/ivf_index.bin

# jieba 词典文件路径（用于降准匹配和词语推荐）
# 格式：word freq pos_tag（每行一个词条）
# 用于编辑距离模糊匹配，与 BERT 语义评分各占 50%
jiebaDictPath:dict/jieba.dict.utf8

# 日志文件路径
logPath:log/log.txt

# 静态 HTML 页面路径（前端界面）
htmlPagePath:cli/html/cli.html

# -------------------- 网络配置 --------------------

# 服务器监听 IP 地址（0.0.0.0 = 监听所有网络接口）
serverIp:0.0.0.0

# 服务器监听端口号
serverPort:8080

# 子 EventLoop 数量
subEventLoopCount:4

# -------------------- 线程池配置 --------------------

# 线程池工作线程数
threadPoolThreadCount:4

# 线程池任务队列最大长度
threadPoolQueueSize:4

# -------------------- 日志配置 --------------------

# 日志缓冲区大小（字节）
logBufferSize:4096

# 日志级别：0=DEBUG 1=INFO 2=WARN 3=ERROR
logLevel:1
