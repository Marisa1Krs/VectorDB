<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marisa Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隐藏原生滚动条 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 1. 流光文字动画 (魔理沙的金黄与紫黑魔法配色) */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-gradient-text {
            background: linear-gradient(-45deg, #f59e0b, #d97706, #7e22ce, #f59e0b);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 4s ease infinite;
        }

        /* 2. 结果卡片的瀑布流丝滑进场动画 */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-card {
            opacity: 0;
            animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* 3. 极限火花 Loading 星星动画 */
        @keyframes masterSparkSpin {
            0% { transform: rotate(0deg) scale(1); filter: drop-shadow(0 0 2px #fbbf24); }
            50% { transform: rotate(180deg) scale(1.2); filter: drop-shadow(0 0 8px #f59e0b); }
            100% { transform: rotate(360deg) scale(1); filter: drop-shadow(0 0 2px #fbbf24); }
        }
        .star-loader {
            animation: masterSparkSpin 1s ease-in-out infinite;
            color: #f59e0b;
        }

        /* 4. 网页背景：淡淡的魔法夜空紫渐变 */
        body {
            background: radial-gradient(circle at 50% 0%, #dee9ed 0%, #f3e8ff 100%);
            background-attachment: fixed;
        }

        /* 4b. 左右两侧流动星星 */
        @keyframes starFall {
            0%   { transform: translateY(-20vh) rotate(0deg); opacity: 0; }
            10%  { opacity: 0.4; }
            90%  { opacity: 0.4; }
            100% { transform: translateY(120vh) rotate(360deg); opacity: 0; }
        }
        .falling-star {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            animation: starFall linear infinite;
            user-select: none;
        }

        /* 5. 右下角悬浮魔理沙动画 */
        @keyframes floatMarisa {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .marisa-mascot {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 160px;
            opacity: 0.8;
            pointer-events: none;
            animation: floatMarisa 4s ease-in-out infinite;
            z-index: 10;
        }

        /* 6. 分页星星悬浮特效 */
        .page-star { transition: text-shadow 0.3s, transform 0.3s; }
        .page-star:hover { text-shadow: 0 0 10px #fbbf24; transform: scale(1.2); }

        /* 7. 星星内嵌数字：艺术字风格，更贴合星星主题 */
        .star-wrap {
            position: relative;
            display: inline-block;
            width: 2.8rem;
            height: 2.8rem;
            text-align: center;
        }
        .star-bg {
            font-size: 2.8rem;
            line-height: 1;
        }
        .star-num {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -52%);
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 0.7rem;
            font-weight: 800;
            color: #1a1a1a;
            z-index: 2;
            pointer-events: none;
            letter-spacing: 0;
        }
        .page-star-active .star-bg {
            filter: drop-shadow(0 0 6px rgba(251,191,36,0.6));
        }
        .page-star-active .star-num {
            font-size: 0.85rem;
            font-weight: 900;
            color: #1a1a1a;
        }
    </style>
</head>

    <script>
        const API_BASE = 'http://192.168.159.129:8080';
        
        const input = document.getElementById('search-input');
        const suggestBox = document.getElementById('suggest-box');
        const suggestList = document.getElementById('suggest-list');
        const resultContainer = document.getElementById('result-container');
        const resultList = document.getElementById('result-list');
        const searchStats = document.getElementById('search-stats');
        const errorMsg = document.getElementById('error-msg');
        const logo = document.getElementById('logo');
        const bodyContainer = document.getElementById('body-container');
        const paginationContainer = document.getElementById('pagination');
        
        const searchIcon = document.getElementById('search-icon');
        const loadingSpinner = document.getElementById('loading-spinner');

        let debounceTimer;
        // 分页状态，每页显示 10 条
        let allResults = [];
        const PAGE_SIZE = 10;

        // 输入联想
        input.addEventListener('input', (e) => {
            const query = e.target.value.trim();
            clearTimeout(debounceTimer);
            if (!query) { suggestBox.classList.add('hidden'); return; }
            debounceTimer = setTimeout(() => { fetchSuggest(query); }, 200);
        });

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = input.value.trim();
                if (query) { 
                    suggestBox.classList.add('hidden'); 
                    doSearch(query); 
                }
            }
        });

        document.addEventListener('click', (e) => {
            if (!input.contains(e.target) && !suggestBox.contains(e.target)) suggestBox.classList.add('hidden');
        });

        async function fetchSuggest(query) {
            try {
                const res = await fetch(`${API_BASE}/suggest?q=${encodeURIComponent(query)}`);
                if (!res.ok) return;
                const data = await res.json();
                if (data && data.length > 0) renderSuggest(data);
                else suggestBox.classList.add('hidden');
            } catch (err) { console.error('Suggest Error:', err); }
        }

        function renderSuggest(items) {
            suggestList.innerHTML = '';
            items.forEach(item => {
                const li = document.createElement('li');
                li.className = 'px-6 py-3 hover:bg-amber-50 cursor-pointer text-gray-700 text-[15px] flex items-center gap-3 transition-colors';
                // 联想图标换成小星星
                li.innerHTML = `<svg class="w-4 h-4 text-amber-400" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg> <span>${item}</span>`;
                li.addEventListener('click', () => {
                    input.value = item;
                    suggestBox.classList.add('hidden');
                    doSearch(item);
                });
                suggestList.appendChild(li);
            });
            suggestBox.classList.remove('hidden');
        }

        async function doSearch(query) {
            errorMsg.classList.add('hidden');
            resultContainer.classList.add('hidden');
            paginationContainer.classList.add('hidden');
            searchIcon.classList.add('hidden');
            loadingSpinner.classList.remove('hidden');
            
            bodyContainer.classList.remove('pt-40');
            bodyContainer.classList.add('pt-12');
            logo.classList.remove('text-6xl', 'mb-10');
            logo.classList.add('text-3xl', 'mb-8');

            try {
                const startTime = performance.now();
                const res = await fetch(`${API_BASE}/search?q=${encodeURIComponent(query)}`);
                const endTime = performance.now();

                if (res.status === 503) throw new Error("系统正在聚集中... (IVF索引初始化中)");
                if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);

                let data = await res.json();
                if (!Array.isArray(data)) data = [data];

                if (data.length > 0) {
                    // 显示搜索时，初始化两侧流动星星
                    initFallingStars();
                    
                    allResults = data;
                    const costTime = ((endTime - startTime) / 1000).toFixed(3);
                    searchStats.innerHTML = `极限火花为您找到约 <span class="text-amber-600 font-bold">${data.length}</span> 本魔法书 <span class="text-amber-200 mx-2">|</span> 施法耗时 ${costTime} 秒`;
                    searchStats.classList.remove('hidden');
                    
                    // 默认渲染第一页
                    renderPage(1);
                } else {
                    throw new Error("宇宙深处没有找到相关文档，换个咒语试试 DA☆ZE？");
                }
            } catch (err) {
                showError(err.message === "Failed to fetch" ? "魔力连接中断，请检查 C++ 后端是否开启" : err.message);
            } finally {
                loadingSpinner.classList.add('hidden');
                searchIcon.classList.remove('hidden');
            }
        }

        function renderPage(pageNum) {
            resultList.innerHTML = '';
            
            const startIdx = (pageNum - 1) * PAGE_SIZE;
            const endIdx = startIdx + PAGE_SIZE;
            const pageData = allResults.slice(startIdx, endIdx);

            pageData.forEach((article, index) => {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = article.content || '';
                let rawText = tempDiv.textContent || tempDiv.innerText || '';
                rawText = rawText.replace(/\s+/g, ' ').trim();

                let itemHtml = `
                <div class="result-card flex flex-col gap-2 p-6 bg-white/60 backdrop-blur-sm rounded-2xl border border-amber-100/50 shadow-sm hover:shadow-[0_10px_40px_-15px_rgba(245,158,11,0.2)] hover:-translate-y-1 hover:border-amber-300/50 transition-all duration-300" style="animation-delay: ${index * 0.12}s">
                    <div class="flex items-center gap-2">
                        <span class="text-amber-500 font-bold">★</span>
                        <a href="${article.url}" target="_blank" class="text-xs text-amber-800/60 truncate max-w-sm hover:text-amber-600 transition-colors">${article.url || 'local://marisa/grimoire'}</a>
                        <span class="ml-auto text-xs font-mono text-purple-400 bg-purple-50 px-2 py-1 rounded-md">Score: ${(article.similarity || 0).toFixed(4)}</span>
                    </div>
                    
                    <a href="${article.url}" target="_blank" class="text-xl font-semibold text-purple-800 hover:text-amber-600 transition-colors block truncate">
                        ${article.title}
                    </a>
                    
                    <p class="text-[#4d5156] text-[15px] leading-relaxed line-clamp-3 break-words mt-1">
                        ${rawText}
                    </p>
                </div>`;

                resultList.innerHTML += itemHtml;
            });

            renderPaginationStars(pageNum);
            resultContainer.classList.remove('hidden');
        }

        // ===== 生成压缩后的页码列表 =====
        function buildPageList(current, total, maxStars = 10) {
            if (total <= maxStars) {
                // 页数少，全显示
                return Array.from({ length: total }, (_, i) => i + 1);
            }

            const pages = [];
            const side = Math.floor((maxStars - 4) / 2); // 当前页两侧各显示几个
            const leftStart = Math.max(2, current - side);
            const leftEnd = Math.min(total - 1, current + side);

            pages.push(1); // 始终显示首页

            if (leftStart > 2) pages.push('...'); // 前省略号

            for (let i = leftStart; i <= leftEnd; i++) {
                pages.push(i);
            }

            if (leftEnd < total - 1) pages.push('...'); // 后省略号

            pages.push(total); // 始终显示末页

            // 如果超过了 maxStars，做修剪
            while (pages.length > maxStars) {
                // 去掉中间多余的页码
                const mid = Math.floor(pages.length / 2);
                pages.splice(mid, 1);
                // 确保省略号相邻
                for (let i = 1; i < pages.length - 1; i++) {
                    if (pages[i] !== '...' && pages[i-1] !== '...' && pages[i+1] !== '...'
                        && pages[i+1] - pages[i-1] > 2) {
                        pages.splice(i, 0, '...');
                        break;
                    }
                }
            }

            return pages;
        }

        // ===== 核心：M ★分页数字★ r i s a 翻页系统 =====
        function renderPaginationStars(currentPage) {
            const totalPages = Math.ceil(allResults.length / PAGE_SIZE);
            if (totalPages <= 1) {
                paginationContainer.classList.add('hidden');
                return;
            }

            paginationContainer.innerHTML = '';

            // 渲染 M
            const mSpan = document.createElement('span');
            mSpan.className = 'text-purple-700 tracking-tighter mr-1 text-2xl';
            mSpan.innerText = 'M';
            paginationContainer.appendChild(mSpan);

            // 生成压缩页码列表
            const pageList = buildPageList(currentPage, totalPages);

            pageList.forEach((item, idx) => {
                if (item === '...') {
                    const dot = document.createElement('span');
                    dot.className = 'text-gray-400 text-2xl px-1 select-none';
                    dot.innerText = '…';
                    paginationContainer.appendChild(dot);
                    return;
                }

                const star = document.createElement('span');
                // 星星内嵌数字（艺术字风格）
                const isActive = item === currentPage;
                star.innerHTML = `<span class="star-wrap">
                    <span class="star-bg">${isActive ? '★' : '☆'}</span>
                    <span class="star-num">${item}</span>
                </span>`;
                star.className = `cursor-pointer page-star transition-all duration-300 inline-block mx-0.5 ${isActive
                    ? 'page-star-active text-amber-400 scale-110'
                    : 'text-gray-300 hover:text-amber-300 hover:scale-110'}`;
                
                star.onclick = () => {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    renderPage(item);
                };
                paginationContainer.appendChild(star);
            });

            // 渲染 r i s a
            const endSpan = document.createElement('span');
            endSpan.className = 'text-purple-700 tracking-widest ml-1 mb-[2px] text-2xl font-bold';
            endSpan.innerText = 'risa';
            paginationContainer.appendChild(endSpan);

            paginationContainer.classList.remove('hidden');
        }

        // ===== 左右两侧流动星星（限定在搜索结果框两侧） =====
        function initFallingStars() {
            // 避免重复添加
            if (document.querySelector('.falling-star')) return;

            // 计算两侧空白区域的边界
            // 结果框 max-w-4xl = 56rem = 896px，居中显示
            const contentWidth = Math.min(window.innerWidth, 896);
            const sideWidth = (window.innerWidth - contentWidth) / 2;
            
            const chars = ['✦', '✧', '★', '⋆', '✶'];
            const colors = ['#f59e0b', '#d97706', '#a855f7', '#c084fc', '#fbbf24', '#e9d5ff'];

            function createStar(leftMin, leftMax) {
                const star = document.createElement('span');
                star.className = 'falling-star';
                star.textContent = chars[Math.floor(Math.random() * chars.length)];
                
                // 随机横向位置限制在 leftMin ~ leftMax 之间
                const left = leftMin + Math.random() * (leftMax - leftMin);
                star.style.left = left + 'px';
                
                // 随机大小 0.5~1.3rem
                const size = 0.5 + Math.random() * 0.8;
                star.style.fontSize = size + 'rem';
                
                star.style.color = colors[Math.floor(Math.random() * colors.length)];
                star.style.opacity = 0.35 + Math.random() * 0.25;
                star.style.animationDuration = (6 + Math.random() * 9) + 's';
                star.style.animationDelay = -(Math.random() * 15) + 's';
                
                document.body.appendChild(star);
            }

            // 左半侧：从 0 到 sideWidth
            // 右半侧：从 window.innerWidth - sideWidth 到 window.innerWidth
            const count = 15 + Math.floor(Math.random() * 11);
            for (let i = 0; i < count; i++) {
                createStar(0, sideWidth);
                createStar(window.innerWidth - sideWidth, window.innerWidth);
            }
        }

    </script>
